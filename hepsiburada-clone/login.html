<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="container">
            <div class="login-form-container">
            <h3 class="login-title">hepsiburada</h3>
            <div class="login-form">
                <div class="login-links">
                    <p class="login">Giriş Yap</p>
                    <p class="signin">Üye Ol</p>
                </div>
                <div class="login-inputs">
                    <input type="email" placeholder="E-posta adresi">
                    <input type="password" placeholder="Şifre">
                </div>
                <div class="forgot-password">
                    <a class="forgot-password-link">Şifremi unuttum</a>
                </div>
                <div class="login-buttons">
                    <button class="login-button">Giriş Yap</button>
                    <button class="phone-login">Telefon numarası ile giriş yap</button>
                </div>
            </div>
            </div>
        </div>

        <div class="container">
            <div class="social-media-login">
                <h3>Sosyal hesabın ile giriş yap</h3>
                <div class="social-media-buttons">
                    <button>
                        <img src="images/apple-logo.png">
                    </button>
                    <button>
                        <img src="images/google-logo.png">
                    </button>
                    <button>
                        <img src="images/facebook-logo.webp">
                    </button>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="copy-right">
                <p class="secure-shopping"><span><img src="icons/shield.png"></span> Güvenli alışveriş</p>
                <p class="company">© Copyright 1998 - 2026 D-Market Elektronik Hizmetler Tic. A.Ş.</p>
            </div>
        </div>

        

    </div>
    <script src="script.js"></script>
</body>
</html>
