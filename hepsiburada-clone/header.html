<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="main-container">
            <div class="links">
                <p>Siparişlerim</p>
                <p>Süper Fiyat, Süper Teklif</p>
                <p>Kampanyalar</p>
                <p class="gk">Girişimci Kadınlar</p>
                <p>Müşteri Hizmetleri</p>
                <p class="hp">Hepsiburada Premium</p>
                <p>Hepsiburada'da Satıcı Ol</p>
            </div>
            <div class="container">
                <div class="hepsi-burada">
                    <h3>hepsiburada</h3>
                    <h5><span class="premium">Premium'u</span> keşfet</h5>
                </div>

                <div class="search-bar">
                    <img src="icons/search-icon.png" alt="search icon">
                    <input type="text" name="filter" placeholder="Ürün, kategori veya marka ara">
                    <div class="color-bar"></div>
                </div>

                <div class="location-filter">
                    <img src="icons/location-icon.png" alt="location icon">
                    <div class="locations"> 
                        <p class="location">Konum</p>
                        <p class="location-select">Konum Seç</p>
                    </div>
                </div>

                <div class="sign-button">
                    <button>
                        <img class="person-icon" src="icons/person-icon.png" alt="person icon">
                        <div class="p">
                            <p>Giriş Yap</p>
                            <p class="signin">veya üye ol</p>
                        </div>
                        <img class="arrow-icon" src="icons/arrow-down.png" alt="arrow icon">
                    </button>
    
                </div>

                <div class="basket">
                    <button>
                        <img src="icons/shopping-cart.png" alt="shopping cart icon">
                        <div class="total-amount">0</div>
                        <p>Sepetim</p>
                    </button>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
